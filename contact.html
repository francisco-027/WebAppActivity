<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Shop - Home</title>

  <!-- Bootstrap CSS (comment out to see plain HTML) -->
  <link rel="icon" type="image/x-icon" href="./img/page-icon.svg">
  <link href="./dist/styles.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark my-custom-bg">
    <div class="container">
      <a class="navbar-brand" href="#"><i class="fa-solid fa-bag-shopping"></i> E-Shop</a>
      <button class="navbar-toggler" type="button">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="bootstrap.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PRODUCTS -->
  <section class="contact-background py-4">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div class="contact-text">

         <div class="contact-icons">
          <h1><i class="fa-solid fa-envelope"></i> </h1>
          <h1><i class="fa-solid fa-headset"></i></h1>
         </div>

     
          <h1>QUESTION?</h1>
          <h1>LET US KNOW</h1>
          <h1>WE ARE READY TO HELP</H1>
       

         <div class="contact-desc">
            <p>If you have any questions or inquiries,</p>
            <p>feel free to reach out to us through this contact form.</p>
            <p>We are here to assist you!</p>
          </div>

       </div>

        <div class="contact-form">
          <div class="contact-name mb-3">
            <input type="text" class="form-control" id="f-name" placeholder="First Name">
            <input type="text" class="form-control" id="l-name" placeholder="Last Name">
          </div>

          <div class="contact-email mb-3">
            <input type="email" class="form-control" id="email" placeholder="Email Address">
          </div>

          <div class="contact-subject mb-3">
            <input type="text" class="form-control" id="subject" placeholder="Subject">
          </div>

          <div class="contact-message mb-3">
            <textarea type="text" class="form-control" id="message" placeholder="Your Message"></textarea>
          </div>

          <div>
            <button class="contact-submit">Contact Sales</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
